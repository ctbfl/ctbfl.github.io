$@14\"}]}]\n16:T1778,"])</script><script>self.__next_f.push([1,"## 0. Preface\n\nThis article provides a concise reference for deploying the Pi0 series models.\n\nWe adopt a CS (Client-Server) architecture:\n\n- Client: only handles robot action commands as input, and environment/robot feedback/observations as output (and runs the simulator/real world)\n- Server: focuses on model inference, receiving feedback/observations from the client and outputting new action commands.\n\nSo you will see that we use two virtual environments later:\none for model execution, one for the simulator, and they communicate with each other via web interfaces.\n\n## 1. Clone the Project\n\n```bash\ngit clone --recurse-submodules git@github.com:Physical-Intelligence/openpi.git\ncd openpi\n````\n\n* Here `--recurse-submodules` means recursive cloning; it will clone all referenced sub-repositories in the repo.\n* Unless otherwise specified, all commands below are executed in the project root directory.\n\n## 2. Environment Setup\n\n### 2.1 Install uv\n\n* **uv** is a new Python package and environment manager developed by Astral (formerly the PyO3 team).\n  Its features: extremely fast, all-in-one, and can replace the combination of `pip + venv (virtualenv) + pip-tools` (the speed comes from Rust implementation + local caching + parallelism).\n\n```bash\nconda create -n uv_envs python=3.10\nconda activate uv_envs\npip install uv\n```\n\n* The steps above are mainly to create a вҖңshellвҖқ environment for running uv.\n  This conda environment `uv_envs` itself will not be used to execute any project code; it only hosts the uv tool and lets you run uv inside it.\n\n### 2.2 Install Main Project Environment (Server)\n\n```bash\nGIT_LFS_SKIP_SMUDLE=1 uv sync\n```\n\n* `openpi/` is the project root, which contains the project configuration file `pyproject.toml`.\n  `pyproject.toml` is the modern unified configuration file for Python projects, used to declare dependencies, build system, and tooling, replacing scattered `setup.py` and `requirements.txt`.\n\n* `GIT_LFS_SKIP_SMUDGE=1` is a temporary environment variable set for the current command only (only effective on this line), recognized by Git LFS.\n  When enabled, `git clone` or `git pull` will not automatically download large files managed by LFS, but only fetch their pointer files, which speeds up syncing and reduces bandwidth usage.\n  If you later need the actual large binary files, you can manually run `git lfs pull` to download them.\n\n* `uv sync` will create a `.venv` virtual environment folder under the project directory and install all required packages based on `pyproject.toml`.\n\n```bash\nsource .venv/bin/activate\n```\n\nThis activates the project-level virtual environment created by uv.\nAt the Python level, this environment completely replaces the previously activated conda environment.\nEven if you see two environment names in your shell prompt, only the most recently activated one is effective.\n\n![image-20251128204035983](/blog/reproducing-pi0-5-simulator/image-20251128204035983.png)\n\n\u003e рҹ§© When a venv is stacked on top of a conda environment:\n\u003e\n\u003e * The Python executable is completely replaced.\n\u003e * PythonвҖҷs import path depends on the configuration inside the Python executable, so all available packages now come from the new venv.\n\u003e * The system `$PATH` is stacked, not replaced, so you can still use the `uv` command in the new environment вҖ” the system will find the `uv` executable from the conda environmentвҖҷs path.\n\u003e * When you run `python`, the system searches `PATH` from front to back; since the latest environment is at the front, it will use the most recently activated Python environment.\n\n### 2.3 Install LIBERO Environment (Client)\n\nSince we will first do inference tests in the LIBERO environment, which has its own dependencies, it is better to create a separate virtual environment for it.\n\n```bash\nconda activate uv_envs # if you are not already in this conda environment\nuv venv --python 3.8 examples/libero/.venv\nsource examples/libero/.venv/bin/activate\n```\n\nWe first create a new virtual environment under the `examples/libero` folder.\n\nThen we activate this new virtual environment, so you should see `(.venv)` appearing in front of `(uv_envs)` in your prompt.\n\nNext, install the dependencies:\n\n```bash\nuv pip sync exmaples/libero/requirements.txt third_party/libero/requirements.txt --extra-index-url https://download.pytorch.org/whl/cu113 --index-strategy=unsafe-best-match\n```\n\n* `uv pip sync` is a uv command that synchronizes the virtual environmentвҖҷs libraries to exactly match your `requirements.txt` files.\n  It also supports multiple requirements files at once (it will merge them and try to find the best solution).\n* The last two parameters are for compatibility with the specified PyTorch CUDA wheels.\n\nNext, install submodules as local editable packages:\n\n```bash\nuv pip install -e packages/openpi-client\nuv pip install -e third_party/libero\n```\n\nLIBERO also requires an environment variable:\n\n```bash\nexport PYTHONPATH=$PYTHONPATH:$PWD/third_party/libero\n```\n\n* You can test with `python -m libero`.\n\n## 3. Simple Run\n\nFirst start the server:\n\n```bash\nsource .venv/bin/activate # make sure you are in the server environment\npython scripts/serve_policy.py --env LIBERO\n```\n\n* Here `--env` selects one of the pretrained policy weights provided by Physical Intelligence. Available options: `ALOHA`, `ALOHA_SIM`, `DROID`, `LIBERO`.\n\n* In the [source code](https://github.com/Physical-Intelligence/openpi/blob/3e0325a5e6032a9ab6beef7395fe47ca724980a5/scripts/serve_policy.py), the default command-line arguments are defined in class `Args`, and `tyro.cli(Args)` is used to merge user-provided CLI arguments with these defaults.\n\n  ![image-20251128220831692](/blog/reproducing-pi0-5-simulator/image-20251128220831692.png)\n\nThen open another terminal (keeping the original server terminal running) and start the client:\n\n```bash\npython examples/libero/main.py\n```\n\nThis example script will automatically run a test. After waiting for a while, you will get a video showing the execution result.\n"])</script><script>self.__next_f.push([1,"17:T1552,"])</script><script>self.__next_f.push([1,"## 0. еүҚиЁҖ\n\nжң¬ж–Үе°қиҜ•жҸҗдҫӣдёҖдёӘз®ҖжҙҒзҡ„йғЁзҪІPi0зі»еҲ—жЁЎеһӢзҡ„еҸӮиҖғгҖӮ\n\nйҮҮз”Ё CS (Client-Server) жһ¶жһ„пјҢ\n\n- е®ўжҲ·з«ҜClientпјҡеҸӘз®ЎжңәеҷЁдәәеҠЁдҪңжҢҮд»Өзҡ„иҫ“е…ҘпјҢзҺҜеўғ/жңәеҷЁдәәжң¬дҪ“еҸҚйҰҲ/и§ӮеҜҹзҡ„иҫ“еҮәпјҲд»ҘеҸҠsimulator/зҺ°е®һдё–з•Ңзҡ„иҝҗиЎҢ)\n- жңҚеҠЎеҷЁз«ҜServerпјҡеҲҷдё“жіЁдәҺжЁЎеһӢжҺЁзҗҶпјҢжҺҘеҸ—е®ўжҲ·з«Ҝзҡ„еҸҚйҰҲ/и§ӮеҜҹж•°жҚ®пјҢз»ҷеҮәж–°зҡ„еҠЁдҪңжҢҮд»ӨгҖӮ\n\nжүҖд»ҘдҪ дјҡзңӢеҲ°пјҢжҲ‘д»¬еҗҺйқўз”ЁдәҶдёӨдёӘиҷҡжӢҹзҺҜеўғпјҢдёҖдёӘз®ЎжЁЎеһӢиҝҗиЎҢпјҢдёҖдёӘз®ЎSimulatorиҝҗиЎҢпјҢд»–д»¬д№Ӣй—ҙйҖҡиҝҮWebжҺҘеҸЈдә’зӣёдј йҖ’ж•°жҚ®гҖӮ\n\n## 1. е…ӢйҡҶйЎ№зӣ®\n\n```bash\ngit clone --recurse-submodules git@github.com:Physical-Intelligence/openpi.git\ncd openpi\n```\n\n- иҝҷйҮҢ--recurse-submodulesд»ЈиЎЁиҝӯд»ЈcloneпјҢдјҡжҠҠд»“еә“дёӯжүҖжңүеј•з”Ёзҡ„еӯҗд»“еә“йғҪcloneдёӢжқҘгҖӮ\n- еҰӮж— зү№ж®ҠиҜҙжҳҺпјҢдёӢйқўжүҖжңүе‘Ҫд»ӨеқҮеңЁйЎ№зӣ®ж №зӣ®еҪ•жү§иЎҢгҖӮ\n\n## 2. е®үиЈ…зҺҜеўғ\n\n### 2.1 е®үиЈ…uv\n\n- uv жҳҜдёҖдёӘж–°е…ҙзҡ„ Python еҢ…з®ЎзҗҶе’ҢзҺҜеўғз®ЎзҗҶе·Ҙе…·пјҢз”ұ AstralпјҲеҺҹ PyO3 еӣўйҳҹпјүејҖеҸ‘гҖӮе®ғзҡ„зү№зӮ№пјҡжһҒеҝ«гҖҒе…ЁиғҪгҖҒжӣҝд»Ј pip + venvпјҲиҷҡжӢҹзҺҜеўғпјү + pip-tools зҡ„з»„еҗҲпјҲйҖҹеәҰдјҳеҠҝжқҘиҮӘ Rust е®һзҺ° + жң¬ең°зј“еӯҳ + е№¶иЎҢпјү\n\n```bash\nconda create -n uv_envs python=3.10\nconda activate uv_envs\npip install uv\n```\n\n- дёҠйқўиҝҷдәӣжӯҘйӘӨдё»иҰҒжҳҜдёәдәҶеҲӣйҖ дёҖдёӘз”ЁжқҘиҝҗиЎҢ uv зҡ„еЈізҺҜеўғгҖӮиҝҷдёӘcondaзҺҜеўғ`uv_envs`жң¬иә«дёҚдјҡз”ЁжқҘжү§иЎҢд»»дҪ•д»Јз ҒпјҢеҸӘжҳҜеңЁиҝҷдёӘ`uv_envs`йҮҢйқўе®үиЈ…uvе·Ҙе…·пјҢдҪҝз”Ёuvе·Ҙе…·гҖӮ\n\n### 2.2 е®үиЈ…йЎ№зӣ®дё»зҺҜеўғпјҲServerз«Ҝпјү\n\n```bash\nGIT_LFS_SKIP_SMUDLE=1 uv sync\n```\n\n- `openpi/`дҪңдёәйЎ№зӣ®ж №зӣ®еҪ•пјҢе…¶дёӯжңүдёҖдёӘpyproject.tomlйЎ№зӣ®й…ҚзҪ®ж–Үд»¶гҖӮ`pyproject.toml`жҳҜзҺ°д»Ј Python йЎ№зӣ®зҡ„з»ҹдёҖй…ҚзҪ®ж–Үд»¶пјҢз”ЁжқҘеЈ°жҳҺйЎ№зӣ®дҫқиө–гҖҒжһ„е»әж–№ејҸе’ҢејҖеҸ‘е·Ҙе…·и®ҫзҪ®пјҢеҸ–д»ЈеҲҶж•Јзҡ„ setup.py е’Ң requirements.txtгҖӮ\n- `GIT_LFS_SKIP_SMUDGE=1` жҳҜдёҖдёӘдёәеҪ“еүҚе‘Ҫд»Өи®ҫзҪ®зҡ„дёҙж—¶зҺҜеўғеҸҳйҮҸпјҲеҸӘеңЁиҝҷдёҖиЎҢжңүж•ҲпјүпјҢз”ұ Git LFS иҜҶеҲ«гҖӮ\n  еҪ“еҗҜз”ЁиҜҘеҸҳйҮҸж—¶пјҢжү§иЎҢ `git clone` жҲ– `git pull` ж—¶дёҚдјҡиҮӘеҠЁдёӢиҪҪ LFS з®ЎзҗҶзҡ„еӨ§ж–Үд»¶пјҢиҖҢжҳҜеҸӘиҺ·еҸ–е®ғд»¬зҡ„жҢҮй’Ҳж–Үд»¶пјҲpointer filesпјүпјҢд»ҺиҖҢеҠ еҝ«еҗҢжӯҘйҖҹеәҰгҖҒеҮҸе°‘еёҰе®ҪеҚ з”ЁгҖӮ\n   еҰӮжһңеҗҺз»ӯйңҖиҰҒе®һйҷ…зҡ„дәҢиҝӣеҲ¶еӨ§ж–Үд»¶пјҢеҸҜжүӢеҠЁиҝҗиЎҢ `git lfs pull` е®ҢжҲҗдёӢиҪҪгҖӮ\n\n- `uv sync`дјҡеңЁйЎ№зӣ®ж–Үд»¶еӨ№дёӢж–°е»әиҷҡжӢҹзҺҜеўғж–Үд»¶еӨ№`.venv`пјҢж №жҚ®йЎ№зӣ®й…ҚзҪ®ж–Үд»¶`pyproject.toml`иҮӘеҠЁе®үиЈ…жүҖйңҖзҡ„еә“гҖӮ\n\n```bash\nsource .venv/bin/activate\n```\n\nиҝҷе°ҶдјҡжҝҖжҙ»еҲҡеҲҡuvеҲӣе»әзҡ„иҝҷдёӘйЎ№зӣ®зә§зҡ„иҷҡжӢҹзҺҜеўғгҖӮжӯӨзҺҜеўғеңЁpythonеұӮйқўдјҡе®Ңе…Ёжӣҝд»ЈеҺҹжң¬жҝҖжҙ»зҡ„condaзҺҜеўғгҖӮе°Ҫз®ЎдҪ еҸҜиғҪеңЁе‘Ҫд»ӨиЎҢзңӢеҲ°еүҚйқўжңүдёӨдёӘзҺҜеўғпјҢдҪҶеҸӘжңүжңҖж–°жҝҖжҙ»зҡ„иҝҷдёӘжҳҜжңүж•Ҳзҡ„гҖӮ\n\n![image-20251128204035983](/blog/reproducing-pi0-5-simulator/image-20251128204035983.png)\n\n\u003eрҹ§© еҪ“venvеҸ еҠ еңЁcondaзҺҜеўғдёҠж—¶\n\u003e\n\u003e- Python executableиў«е®Ңе…ЁжӣҝжҚў\n\u003e- Pythonз”ЁжқҘжүҫеҢ…зҡ„и·Ҝеҫ„дҫқиө–дәҺpython executableеҶ…йғЁзҡ„й…ҚзҪ®пјҢжүҖд»ҘжүҖжңүеҸҜз”ЁеҢ…йғҪиў«жӣҝжҚўдёәж–°зҺҜеўғзҡ„\n\u003e- зі»з»ҹзҡ„$PATHжҳҜеҸ еҠ иҖҢйқһжӣҝд»ЈпјҢжүҖд»ҘдҪ д»Қз„¶еҸҜд»ҘеңЁж–°зҺҜеўғйҮҢйқўдҪҝз”ЁuvжҢҮд»ӨпјҢеӣ дёәзі»з»ҹдјҡеңЁcondaзҺҜеўғзҡ„и·Ҝеҫ„дёӢжүҫеҲ°uvеҢ…зҡ„еҸҜжү§иЎҢж–Үд»¶жқҘжү§иЎҢгҖӮ\n\u003e- еҪ“дҪ дҪҝз”Ёpythonж—¶пјҢзі»з»ҹиҮӘеҠЁеңЁpathйҮҢйқўд»ҺеүҚеҫҖеҗҺжүҫpython executeableпјҢз”ұдәҺжңҖж–°еҠ зҡ„зҺҜеўғеңЁжңҖеүҚйқўпјҢжүҖд»ҘдјҡдҪҝз”ЁжңҖж–°жҝҖжҙ»зҡ„иҝҷдёӘpythonзҺҜеўғгҖӮ\n\n### 2.3 е®үиЈ…LIBEROзҺҜеўғпјҲClientз«Ҝпјү\n\nеӣ дёәжң¬ж–ҮдёӯйҰ–е…ҲеңЁLIBEROиҷҡжӢҹзҺҜеўғдёӯиҝӣиЎҢжҺЁзҗҶжөӢиҜ•пјҢе…¶жңүиҮӘе·ұзҡ„дҫқиө–йЎ№жүҖд»ҘжңҖеҘҪд№ҹиҮӘе·ұжҗһдёҖдёӘиҷҡжӢҹзҺҜеўғгҖӮ\n\n```bash\nconda activate uv_envs #еҰӮжһңдҪ жІЎжңүеңЁиҝҷдёӘcondaзҺҜеўғйҮҢ\nuv venv --python 3.8 examples/libero/.venv\nsource examples/libero/.venv/bin/activate\n```\n\nжҲ‘д»¬йҰ–е…ҲеңЁ`examples/libero`ж–Үд»¶еӨ№дёӯеҸҲеҲӣе»әдәҶдёҖдёӘж–°зҡ„иҷҡжӢҹзҺҜеўғгҖӮ\n\nйҡҸеҗҺжҝҖжҙ»дәҶж–°зҡ„иҷҡжӢҹзҺҜеўғпјҢжүҖд»ҘдҪ еә”иҜҘзңӢеҲ°`(.venv)`еҮәзҺ°еңЁ`(uv_envs)`зҡ„еүҚйқўгҖӮ\n\nз„¶еҗҺжҲ‘д»¬е®үиЈ…дҫқиө–йЎ№\n\n```bash\nuv pip sync exmaples/libero/requirements.txt third_party/libero/requirements.txt --extra-index-url https://download.pytorch.org/whl/cu113 --index-strategy=unsafe-best-match\n```\n\n- `uv pip sync` жҳҜдёҖдёӘuvе‘Ҫд»ӨпјҢдјҡе°ҶиҷҡжӢҹзҺҜеўғдёӯзҡ„дҫқиө–еә“еҗҢжӯҘжҲҗе’ҢдҪ зҡ„requirements.txtе®Ңе…ЁдёҖиҮҙгҖӮе№¶дё”иҝҳж”ҜжҢҒеӨҡдёӘrequirementsж–Үд»¶дёҖиө·пјҲд»–дјҡжҷәиғҪеҗҲе№¶жүҫжңҖдјҳж–№жЎҲпјүгҖӮ\n- еҗҺйқўзҡ„дёӨдёӘеҸӮж•°жҳҜдёәдәҶдҝқиҜҒе…је®№жҖ§\n\nжҺҘдёӢжқҘе°ҶеӯҗжЁЎеқ—д»ҘеҢ…зҡ„еҪўејҸе®үиЈ…еңЁжң¬ең°\n\n```bash\nuv pip install -e packages/openpi-client\nuv pip install -e third_party/libero\n```\n\nLiberoзҡ„д»Јз ҒиҝҗиЎҢиҝҳйңҖиҰҒеҠ дёӘзҺҜеўғеҸҳйҮҸ\n\n```bash\nexport PYTHONPATH=$PYTHONPATH:$PWD/third_party/libero\n```\n\n- еҸҜдҪҝз”Ё`python -m libero`жөӢиҜ•\n\n## 3. з®ҖеҚ•иҝҗиЎҢ\n\nйҰ–е…ҲеҗҜеҠЁserver:\n\n```bash\nsource .venv/bin/activate #иҰҒеңЁserverзҡ„зҺҜеўғдёӯ\npython scripts/serve_policy.py --env LIBERO\n```\n\n- иҝҷйҮҢ--envжҳҜйҖүжӢ©дёҖзі»еҲ—Physical IntelligenceжҸҗдҫӣзҡ„и®ӯз»ғеҘҪзҡ„жЁЎеһӢжқғйҮҚпјҢеҸҜйҖү`ALOHA`пјҢ `ALOHA_SIM`пјҢ`DROID`пјҢ`LIBERO`гҖӮ\n\n- [жәҗз Ғ](https://github.com/Physical-Intelligence/openpi/blob/3e0325a5e6032a9ab6beef7395fe47ca724980a5/scripts/serve_policy.py)йҮҢйқўпјҢй»ҳи®Өе‘Ҫд»ӨиЎҢеҸӮж•°жҳҜи®ҫзҪ®еңЁclass ArgsйҮҢйқўпјҢдҪҝз”Ё`tyro.cli(Args)`жқҘе°Ҷз”ЁжҲ·зҡ„е‘Ҫд»ӨиЎҢеҸӮж•°е’Ңй»ҳи®ӨеҸӮж•°иһҚеҗҲгҖӮ\n\n  ![image-20251128220831692](/blog/reproducing-pi0-5-simulator/image-20251128220831692.png)\n\nз„¶еҗҺеҶҚејҖдёҖдёӘз»Ҳз«ҜпјҲдҝқжҢҒеҺҹжқҘиҝҷдёӘејҖеҗҜпјүпјҢеҗҜеҠЁclientпјҡ\n\n```\npython examples/libero/main.py\n```\n\nиҝҷдёӘж ·дҫӢд»Јз ҒдјҡиҮӘеҠЁи·‘дёҖдёӘжөӢиҜ•пјҢзӯүеҫ…дёҖж®өж—¶й—ҙеҗҺдҪ дјҡеҫ—еҲ°жү§иЎҢз»“жһңзҡ„и§Ҷйў‘гҖӮ\n"])</script><script>self.__next_f.push([1,"7:[\"$\",\"$12\",n
