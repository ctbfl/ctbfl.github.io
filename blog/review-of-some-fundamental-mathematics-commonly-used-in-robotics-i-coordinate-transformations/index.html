1dcaf51.js\",\"535\",\"static/chunks/app/blog/%5Bpostslug%5D/page-23fa8c1cb4409c23.js\"],\"default\"]\n9:[\"$\",\"$12\",null,{\"fallback\":null,\"children\":[\"$\",\"$L13\",null,{\"promise\":\"$@14\"}]}]\n16:T17ed,"])</script><script>self.__next_f.push([1,"Record some basic knowledge so I can pick it up when I forget.\n\n## 1. Coordinate Transformation\n\nSuppose we have coordinate frames $A$ and $B$. Also suppose there is a point $P_0$ in space and a vector $\\vec{t}$ in space. How do we represent the same point and the same vector in coordinate frame $B$?\n\nThe coordinate frame $B$ expressed in coordinate frame $A$ is: (the superscript $A$ indicates it is represented in frame $A$)\n\n$$\n{}^{A}T_{B} =\n\\begin{bmatrix}\nR_{3\\times3} \u0026 t_{3\\times1} \\\\\n0;0;0 \u0026 1\n\\end{bmatrix}\n=\n\\begin{bmatrix}\nR_{B} \u0026 t_{B} \\\\\n0;0;0 \u0026 1\n\\end{bmatrix}\n=\n\\begin{bmatrix}\nr_{11} \u0026 r_{12} \u0026 r_{13} \u0026 x \\\\\nr_{21} \u0026 r_{22} \u0026 r_{23} \u0026 y \\\\\nr_{31} \u0026 r_{32} \u0026 r_{33} \u0026 z \\\\\n0 \u0026 0 \u0026 0 \u0026 1\n\\end{bmatrix}\n$$\n\nwhere\n\n$$\nR_{3\\times3}=\\begin{bmatrix}\n{}^A\\hat x_B \u0026 {}^A\\hat y_B \u0026 {}^A\\hat z_B\n\\end{bmatrix}\n$$\n\nrepresents the $x,y,z$ axes of coordinate frame $B$ expressed in frame $A$ (each ${}^A\\hat x_B$ is a unit direction vector).\n\nand\n\n$$\nt_B=\\begin{bmatrix}x\\\\y\\\\z\\end{bmatrix}\n$$\n\nis the coordinate of the origin $O_B$ of frame $B$ expressed in frame $A$.\n\nNote: ${}^{A}T_{B}$ is usually called the homogeneous transformation matrix.\n\n---\n\n### Transforming a Point Between Coordinate Frames\n\nA point $P_0$ in space is expressed in frame $A$ as: ( $\\mathbf{P}$ denotes the coordinate vector )\n\n$$\n{}^{A}\\mathbf{p}_{P_0}=\\begin{bmatrix}\nx_0\\\\\ny_0\\\\\nz_0\n\\end{bmatrix}\n$$\n\nHow do we express $P_0$ in frame $B$?\n\n\u003e First, reason in frame $B$. Suppose $P_0$ in frame $B$ is\n\u003e $$\n\u003e {}^B\\mathbf{P}_{P_0}=\\begin{bmatrix}\n\u003e x_0'\\\\\n\u003e y_0'\\\\\n\u003e z_0'\n\u003e \\end{bmatrix}\n\u003e $$\n\u003e Geometrically,\n\u003e $$\n\u003e {}^B\\mathbf{P}_{P_0}={}^B\\mathbf{P}_{O_B}+x_0'\\cdot{}^B\\hat x_B+ y_0'\\cdot{}^B\\hat y_B +z_0'\\cdot{}^B\\hat z_B\n\u003e $$\n\u003e Convert the same geometric expression to frame $A$ (note the coefficients are unchanged):\n\u003e $$\n\u003e {}^A\\mathbf{P}_{P_0}={}^A\\mathbf{P}_{O_B}+x_0’\\cdot{}^A\\hat x_B+ y_0'\\cdot{}^A\\hat y_B +z_0’\\cdot{}^A\\hat z_B\n\u003e $$\n\u003e Nothing actually changes — only the representation.\n\u003e\n\u003e Substitute known quantities:\n\u003e $$\n\u003e {}^B\\mathbf{P}_{P_0}=\\begin{bmatrix}\n\u003e x_0'\\\\\n\u003e y_0'\\\\\n\u003e z_0'\n\u003e \\end{bmatrix}\n\u003e =\\begin{bmatrix}\n\u003e 0\\\\\n\u003e 0\\\\\n\u003e 0\n\u003e \\end{bmatrix}\n\u003e +x_0'\\cdot\\begin{bmatrix}\n\u003e 1\\\\\n\u003e 0\\\\\n\u003e 0\n\u003e \\end{bmatrix}\n\u003e +y_0'\\cdot\\begin{bmatrix}\n\u003e 0\\\\\n\u003e 1\\\\\n\u003e 0\n\u003e \\end{bmatrix}\n\u003e +z_0'\\cdot\\begin{bmatrix}\n\u003e 0\\\\\n\u003e 0\\\\\n\u003e 1\n\u003e \\end{bmatrix}\n\u003e $$\n\u003e and\n\u003e $$\n\u003e \\begin{bmatrix}\n\u003e x_0\\\\\n\u003e y_0\\\\\n\u003e z_0\n\u003e \\end{bmatrix}=\n\u003e t_B+\\begin{bmatrix}\n\u003e {}^A\\hat x_B \u0026 {}^A\\hat y_B \u0026 {}^A\\hat z_B\n\u003e \\end{bmatrix}\\cdot\n\u003e \\begin{bmatrix}\n\u003e x_0'\\\\\n\u003e y_0'\\\\\n\u003e z_0'\n\u003e \\end{bmatrix}\n\u003e $$\n\u003e Now $x_0, y_0, z_0, {}^A\\hat x_B, {}^A\\hat y_B, {}^A\\hat z_B, t_B$ are known, so ${}^B\\mathbf{P}_{P_0}$ can be solved.\n\u003e\n\u003e For convenience, append one more row:\n\u003e $$\n\u003e \\begin{align}\n\u003e \\begin{bmatrix}\n\u003e x_0\\\\\n\u003e y_0\\\\\n\u003e z_0\\\\\n\u003e 1\n\u003e \\end{bmatrix}\u0026=\n\u003e \\begin{bmatrix}\n\u003e t_B\\\\\n\u003e 1\n\u003e \\end{bmatrix}\n\u003e +\\begin{bmatrix}\n\u003e {}^A\\hat x_B \u0026 {}^A\\hat y_B \u0026 {}^A\\hat z_B \\\\\n\u003e 0 \u0026 0 \u0026 0\n\u003e \\end{bmatrix}\\cdot\n\u003e \\begin{bmatrix}\n\u003e x_0'\\\\\n\u003e y_0'\\\\\n\u003e z_0'\n\u003e \\end{bmatrix}\\\\\n\u003e \u0026=\\begin{bmatrix}\n\u003e {}^A\\hat x_B \u0026 {}^A\\hat y_B \u0026 {}^A\\hat z_B \u0026 t_B\\\\\n\u003e 0 \u0026 0\u0026 0 \u0026 1\n\u003e \\end{bmatrix}\\cdot\n\u003e \\begin{bmatrix}\n\u003e x_0'\\\\\n\u003e y_0'\\\\\n\u003e z_0'\\\\\n\u003e 1\n\u003e \\end{bmatrix}\\\\\n\u003e \u0026= {}^{A}T_{B} \\cdot\n\u003e \\begin{bmatrix}\n\u003e x_0'\\\\\n\u003e y_0'\\\\\n\u003e z_0' \\\\\n\u003e 1\n\u003e \\end{bmatrix}\n\u003e \n\u003e \\end{align}\n\u003e $$\n\u003e That is (denote coordinates with appended 1 as $\\tilde{P}$; vectors append 0 instead of 1):\n\u003e $$\n\u003e {}^A\\mathbf{\\tilde{P}}_{P_0} = {}^{A}T_{B}\\cdot {}^B\\mathbf{\\tilde{P}}_{P_0}\n\u003e $$\n\u003e Therefore (left-multiply both sides by ${}^{A}T_{B}^{-1}$):\n\u003e $$\n\u003e {}^{A}T_{B}^{-1}\\cdot{}^A\\mathbf{\\tilde{P}}_{P_0} = {}^B\\mathbf{\\tilde{P}}_{P_0}\n\u003e $$\n\nIn summary,\n\n$$\n\\begin{bmatrix}\nx_0'\\\\\ny_0'\\\\\nz_0' \\\\\n1\n\\end{bmatrix}={}^{A}T_{B}^{-1}\\cdot \\begin{bmatrix}\nx_0\\\\\ny_0\\\\\nz_0\\\\\n1\n\\end{bmatrix}\n$$\n\nBy symmetry,\n\n$$\n{}^A\\mathbf{\\tilde{P}}_{P_0} = {}^{A}T_{B}\\cdot {}^B\\mathbf{\\tilde{P}}_{P_0}\\\\\n{}^B\\mathbf{\\tilde{P}}_{P_0} = {}^{B}T_{A}\\cdot {}^A\\mathbf{\\tilde{P}}_{P_0}\n$$\n\nwhich implies\n\n$$\n{}^{A}T_{B}={}^{B}T_{A}^{-1}\\\\\n{}^{A}T_{B}\\cdot{}^{B}T_{A}=I\n$$\n\n---\n\n### Transforming a Vector Between Coordinate Frames\n\nConsider a vector $\\vec{t}$ in space expressed in frame $A$ as:\n\n$$\n{}^{A}\\vec{t}=\n\\begin{bmatrix}t_x\\\\t_y\\\\t_z\\end{bmatrix}\n$$\n\nHow do we express it in frame $B$?\n\n\u003e A vector is translation-invariant. Move its start point to the origin $O_A$. Then it becomes a vector from $O_A$ to $T_0=[t_x, t_y, t_z]^T$. Append 0 for convenience:\n\u003e $$\n\u003e {}^{A}\\tilde{\\vec{t}} = \\begin{bmatrix}t_x\\\\t_y\\\\t_z\\\\0\\end{bmatrix}=\\begin{bmatrix}t_x\\\\t_y\\\\t_z\\\\1\\end{bmatrix}-\\begin{bmatrix}0\\\\0\\\\0\\\\1\\end{bmatrix}={}^A\\mathbf{\\tilde{P}}_{T_0}-{}^A\\mathbf{\\tilde{P}}_{O_A}\n\u003e $$\n\u003e Convert both points to frame $B$ and subtract:\n\u003e $$\n\u003e \\begin{align}\n\u003e {}^{B}\\tilde{\\vec{t}} \u0026={}^B\\mathbf{\\tilde{P}}_{T_0}-{}^B\\mathbf{\\tilde{P}}_{O_A}\\\\\n\u003e \u0026={}^BT_{A}\\cdot ({}^A\\mathbf{\\tilde{P}}_{T_0} - {}^A\\mathbf{\\tilde{P}}_{O_A})\\\\\n\u003e \u0026={}^BT_{A}\\cdot{}^{A}\\tilde{\\vec{t}}\\\\\n\u003e \u0026={}^AT_{B}^{-1}\\cdot{}^{A}\\tilde{\\vec{t}}\n\u003e \\end{align}\n\u003e $$\n\nThus\n\n$$\n\\begin{bmatrix}\nt_x'\\\\\nt_y'\\\\\nt_z'\\\\\n0\n\\end{bmatrix}={}^BT_{A}\\cdot\\begin{bmatrix}\nt_x\\\\\nt_y\\\\\nt_z\\\\\n0\n\\end{bmatrix}={}^AT_{B}^{-1}\\cdot\\begin{bmatrix}\nt_x\\\\\nt_y\\\\\nt_z\\\\\n0\n\\end{bmatrix}\n$$\n\n---\n\n### Some Practical Tricks\n\n1. **Chain Rule**\n\n   $$\n   {}^A\\mathbf{\\tilde{P}}={}^AT_B\\cdot {}^BT_C\\cdot{}^C\\mathbf{\\tilde{P}}\\\\\n   {}^A\\mathbf{\\tilde{P}}={}^AT_B\\cdot {}^BT_C\\cdot{}^CT_D\\cdot{}^D\\mathbf{\\tilde{P}}\n   $$\n\n   Note: In much of the code, a variable written as `T_A_from_B` actually represents ${}^AT_B$, so that variable names can be used to conveniently construct chained transformations. The word *from* can be interpreted in this way:\n\n   $$\n   {}^A\\mathbf{\\tilde{P}}_{P_0} = {}^{A}T_{B}\\cdot {}^B\\mathbf{\\tilde{P}}_{P_0}.\n   $$\n   \n   In practice, ${}^AT_B$ transforms coordinates expressed in frame B into coordinates expressed in frame A, which is why it is named `T_A_from_B`.\n\n\n2. **Fast Inverse Computation**\n   $$\n   {}^AT_{B}=\\begin{bmatrix}\n   R \u0026 t\\\\\n   0 \u0026 1\n   \\end{bmatrix}\n   $$\n   \n   $$\n   {}^AT_{B}^{-1}=\\begin{bmatrix}\n   R^T \u0026 -R^T\\cdot t\\\\\n   0 \u0026 1\n   \\end{bmatrix}\n   $$\n"])</script><script>self.__next_f.push([1,"17:T200b,"])</script><script>self.__next_f.push([1,"记录一些基础知识，供自己想不起来的时候拾取。\n\n## 1. 坐标变换\n\n假设我们有坐标系$A$ 和$B$ 。以及一个空间中的点$P_0$和空间中的一个向量$\\vec{t}$，我们将如何在坐标系$B$中表征同一个点和同一个向量？\n\n坐标系$B$在坐标系$A$中被表示为：（左上角的$A$表示在坐标系$A$中表征）\n$$\n{}^{A}T_{B} =\n\\begin{bmatrix}\nR_{3\\times3} \u0026 t_{3\\times1} \\\\\n0;0;0 \u0026 1\n\\end{bmatrix}\n=\n\\begin{bmatrix}\nR_{B} \u0026 t_{B} \\\\\n0;0;0 \u0026 1\n\\end{bmatrix}\n=\n\\begin{bmatrix}\nr_{11} \u0026 r_{12} \u0026 r_{13} \u0026 x \\\\\nr_{21} \u0026 r_{22} \u0026 r_{23} \u0026 y \\\\\nr_{31} \u0026 r_{32} \u0026 r_{33} \u0026 z \\\\\n0 \u0026 0 \u0026 0 \u0026 1\n\\end{bmatrix}\n$$\n其中\n$$\nR_{3\\times3}=\\begin{bmatrix}\n{}^A\\hat x_B \u0026 {}^A\\hat y_B \u0026 {}^A\\hat z_B\n\\end{bmatrix}\n$$\n代表了坐标系B的$x,y,z$三个轴在A坐标系中的表达（每个${}^A\\hat x_B$都是表征方向的单位向量）\n\n而\n$$\nt_B=\\begin{bmatrix}x\\\\y\\\\z\\end{bmatrix}\n$$\n是坐标系B的坐标原点$O_B$在坐标系A下的表达。\n\n注：这个${}^{A}T_{B}$通常被大家成为齐次变换矩阵。 \n\n### 点位置在不同坐标系下的转换\n\n空间中的点$P_0$，他在坐标系$A$中被表示为:  ($\\mathbf{P}$代表取点的坐标)\n$$\n{}^{A}\\mathbf{p}_{P_0}=\\begin{bmatrix}\nx_0\\\\\ny_0\\\\\nz_0\n\\end{bmatrix}\n$$\n那么如何坐标系B中表达$P_0$呢？\n\n\u003e 首先在坐标$B$下思考问题，假设$P_0$在$B$坐标系下表达为\n\u003e $$\n\u003e {}^B\\mathbf{P}_{P_0}=\\begin{bmatrix}\n\u003e x_0'\\\\\n\u003e y_0'\\\\\n\u003e z_0'\n\u003e \\end{bmatrix}\n\u003e $$\n\u003e 从几何上思考，在B坐标系下表征$P_0$是这样：\n\u003e $$\n\u003e {}^B\\mathbf{P}_{P_0}={}^B\\mathbf{P}_{O_B}+x_0'\\cdot{}^B\\hat x_B+ y_0'\\cdot{}^B\\hat y_B +z_0'\\cdot{}^B\\hat z_B\\\\\n\u003e $$\n\u003e 将同样的几何表达转化到A坐标系下表征就是:（注意向量的系数是一样的）\n\u003e $$\n\u003e {}^A\\mathbf{P}_{P_0}={}^A\\mathbf{P}_{O_B}+x_0’\\cdot{}^A\\hat x_B+ y_0'\\cdot{}^A\\hat y_B +z_0’\\cdot{}^A\\hat z_B\n\u003e $$\n\u003e 实际上什么都没有变化，只是表达方式变了。\n\u003e\n\u003e 看起来不太像人话，把已知的东西带入上面两行就看懂了\n\u003e $$\n\u003e {}^B\\mathbf{P}_{P_0}=\\begin{bmatrix}\n\u003e x_0'\\\\\n\u003e y_0'\\\\\n\u003e z_0'\n\u003e \\end{bmatrix}\n\u003e =\\begin{bmatrix}\n\u003e 0\\\\\n\u003e 0\\\\\n\u003e 0\n\u003e \\end{bmatrix}\n\u003e +x_0'\\cdot\\begin{bmatrix}\n\u003e 1\\\\\n\u003e 0\\\\\n\u003e 0\n\u003e \\end{bmatrix}\n\u003e +y_0'\\cdot\\begin{bmatrix}\n\u003e 0\\\\\n\u003e 1\\\\\n\u003e 0\n\u003e \\end{bmatrix}\n\u003e +z_0'\\cdot\\begin{bmatrix}\n\u003e 0\\\\\n\u003e 0\\\\\n\u003e 1\n\u003e \\end{bmatrix}\n\u003e $$\n\u003e 以及\n\u003e $$\n\u003e \\begin{bmatrix}\n\u003e x_0\\\\\n\u003e y_0\\\\\n\u003e z_0\n\u003e \\end{bmatrix}=\n\u003e t_B+\\begin{bmatrix}\n\u003e {}^A\\hat x_B \u0026 {}^A\\hat y_B \u0026 {}^A\\hat z_B\n\u003e \\end{bmatrix}\\cdot\n\u003e \\begin{bmatrix}\n\u003e x_0'\\\\\n\u003e y_0'\\\\\n\u003e z_0'\n\u003e \\end{bmatrix}\n\u003e $$\n\u003e 可以发现在第二行中，我们已知了所有的$x_0, y_0, z_0,{}^A\\hat x_B,  {}^A\\hat y_B, {}^A\\hat z_B, t_B$，已经可以将${}^B\\mathbf{P}_{P_0}$算出来了。\n\u003e\n\u003e 为了表达方便，在下面补出一行，从而\n\u003e $$\n\u003e \\begin{align}\n\u003e \\begin{bmatrix}\n\u003e x_0\\\\\n\u003e y_0\\\\\n\u003e z_0\\\\\n\u003e 1\n\u003e \\end{bmatrix}\u0026=\n\u003e \\begin{bmatrix}\n\u003e t_B\\\\\n\u003e 1\n\u003e \\end{bmatrix}\n\u003e +\\begin{bmatrix}\n\u003e {}^A\\hat x_B \u0026 {}^A\\hat y_B \u0026 {}^A\\hat z_B \\\\\n\u003e 0 \u0026 0 \u0026 0\n\u003e \\end{bmatrix}\\cdot\n\u003e \\begin{bmatrix}\n\u003e x_0'\\\\\n\u003e y_0'\\\\\n\u003e z_0'\n\u003e \\end{bmatrix}\\\\\n\u003e \u0026=\\begin{bmatrix}\n\u003e {}^A\\hat x_B \u0026 {}^A\\hat y_B \u0026 {}^A\\hat z_B \u0026 t_B\\\\\n\u003e 0 \u0026 0\u0026 0 \u0026 1\n\u003e \\end{bmatrix}\\cdot\n\u003e \\begin{bmatrix}\n\u003e x_0'\\\\\n\u003e y_0'\\\\\n\u003e z_0'\\\\\n\u003e 1\n\u003e \\end{bmatrix}\\\\\n\u003e \u0026= {}^{A}T_{B} \\cdot\n\u003e \\begin{bmatrix}\n\u003e x_0'\\\\\n\u003e y_0'\\\\\n\u003e z_0' \\\\\n\u003e 1\n\u003e \\end{bmatrix}\n\u003e \n\u003e \\end{align}\n\u003e $$\n\u003e 也就是（如果标记加了1的这种坐标为$\\tilde{P}$，注意如果向量的话是下面加个0不是1）\n\u003e $$\n\u003e {}^A\\mathbf{\\tilde{P}}_{P_0} = {}^{A}T_{B}\\cdot {}^B\\mathbf{\\tilde{P}}_{P_0}\n\u003e $$\n\u003e 从而反过来(两边同时左乘${}^{A}T_{B}^{-1}$)就是\n\u003e $$\n\u003e {}^{A}T_{B}^{-1}\\cdot{}^A\\mathbf{\\tilde{P}}_{P_0} = {}^B\\mathbf{\\tilde{P}}_{P_0}\n\u003e $$\n\n总的来说，就是\n$$\n\\begin{bmatrix}\nx_0'\\\\\ny_0'\\\\\nz_0' \\\\\n1\n\\end{bmatrix}={}^{A}T_{B}^{-1}\\cdot \\begin{bmatrix}\nx_0\\\\\ny_0\\\\\nz_0\\\\\n1\n\\end{bmatrix}\n$$\n\n\u003e 很显然上面的推导过程是对称的，所以我们很容易得到两个对称的式子\n\u003e $$\n\u003e {}^A\\mathbf{\\tilde{P}}_{P_0} = {}^{A}T_{B}\\cdot {}^B\\mathbf{\\tilde{P}}_{P_0}\\\\\n\u003e {}^B\\mathbf{\\tilde{P}}_{P_0} = {}^{B}T_{A}\\cdot {}^A\\mathbf{\\tilde{P}}_{P_0}\n\u003e $$\n\u003e 重写下第二个式子就是\n\u003e $$\n\u003e {}^A\\mathbf{\\tilde{P}}_{P_0}={}^{B}T_{A}^{-1}{}^B\\mathbf{\\tilde{P}}_{P_0}\n\u003e $$\n\u003e 因此\n\u003e $$\n\u003e {}^{A}T_{B}={}^{B}T_{A}^{-1}\\\\\n\u003e {}^{A}T_{B}\\cdot{}^{B}T_{A}=I\n\u003e $$\n\n因而我们也有\n$$\n\\begin{bmatrix}\nx_0'\\\\\ny_0'\\\\\nz_0' \\\\\n1\n\\end{bmatrix}={}^{B}T_{A}\\cdot \\begin{bmatrix}\nx_0\\\\\ny_0\\\\\nz_0\\\\\n1\n\\end{bmatrix}\n$$\n其中左边的是在B坐标系下的坐标，右边的是在A坐标系下的坐标，${}^BT_A$是在B坐标系下对A坐标系的表征。\n\n### 向量在不同坐标系下的转换\n\n空间中还有一个向量$\\vec{t}$，他在坐标系A中被表示为：\n$$\n{}^{A}\\vec{t}=\n\\begin{bmatrix}t_x\\\\t_y\\\\t_z\\end{bmatrix}\n$$\n他在坐标系B中又怎么表达呢？\n\n\u003e 实际上很简单，向量是平移无关的，我们只要把它的出发点移动到A坐标系的原点，那么他就是从$O_A$出发，移动到点$T_0=[t_x, t_y, t_z]^T$的一个具体向量。我们这里给向量下面加一个0方便表达，记为$\\tilde{\\vec{t}}$\n\u003e $$\n\u003e {}^{A}\\tilde{\\vec{t}} = \\begin{bmatrix}t_x\\\\t_y\\\\t_z\\\\0\\end{bmatrix}=\\begin{bmatrix}t_x\\\\t_y\\\\t_z\\\\1\\end{bmatrix}-\\begin{bmatrix}0\\\\0\\\\0\\\\1\\end{bmatrix}={}^A\\mathbf{\\tilde{P}}_{T_0}-{}^A\\mathbf{\\tilde{P}}_{O_A}\n\u003e $$\n\u003e 我们直接把这两个点都转换到B坐标系中，然后对他们做一个减就行。（因为这两个点是在空间中不变的）\n\u003e $$\n\u003e \\begin{align}\n\u003e {}^{B}\\tilde{\\vec{t}} \u0026={}^B\\mathbf{\\tilde{P}}_{T_0}-{}^B\\mathbf{\\tilde{P}}_{O_A}\\\\\n\u003e \u0026={}^BT_{A}\\cdot ({}^A\\mathbf{\\tilde{P}}_{T_0} - {}^A\\mathbf{\\tilde{P}}_{O_A})\\\\\n\u003e \u0026={}^BT_{A}\\cdot{}^{A}\\tilde{\\vec{t}}\\\\\n\u003e \u0026={}^AT_{B}^{-1}\\cdot{}^{A}\\tilde{\\vec{t}}\n\u003e \\end{align}\n\u003e $$\n\u003e 所以从形式上看其实是一样的，区别只是下面是加个0而不是像坐标一样子下面加个1。\n\n所以${}^{B}\\vec{t}=[{t_x, t_y, t_z}]^T$计算方式是\n$$\n\\begin{bmatrix}\nt_x'\\\\\nt_y'\\\\\nt_z'\\\\\n0\n\\end{bmatrix}={}^BT_{A}\\cdot\\begin{bmatrix}\nt_x\\\\\nt_y\\\\\nt_z\\\\\n0\n\\end{bmatrix}={}^AT_{B}^{-1}\\cdot\\begin{bmatrix}\nt_x\\\\\nt_y\\\\\nt_z\\\\\n0\n\\end{bmatrix}\n$$\n\n\n### 一点小技巧\n\n1. **链式法则**\n\n   从${}^B\\mathbf{\\tilde{P}}_{P_0} = {}^{B}T_{A}\\cdot {}^A\\mathbf{\\tilde{P}}_{P_0}$里面我们就能看到一种类似相消的规则，右侧第一项的下标A和右侧第二项的左上标A消去了，剩下右侧第一项的左上标B，因此得到了左侧的这个式子。这个规则可以任意延长，从而\n   $$\n   {}^A\\mathbf{\\tilde{P}}={}^AT_B\\cdot {}^BT_C\\cdot{}^C\\mathbf{\\tilde{P}}\\\\\n   {}^A\\mathbf{\\tilde{P}}={}^AT_B\\cdot {}^BT_C\\cdot{}{}^CT_D\\cdot{}^D\\mathbf{\\tilde{P}}\\\\\n   ...\n   $$\n\n​\t 对于向量也是一样的，只是再次注意向量的下面是加0，坐标的下面是加1.\n\n   注：许多代码里面写的`T_A_from_B`，实际上代表的是${}^AT_B$ 从而可以在代码里面用变量名构造链式计算。这里的from可以这样理解\n   $$\n   {}^A\\mathbf{\\tilde{P}}_{P_0} = {}^{A}T_{B}\\cdot {}^B\\mathbf{\\tilde{P}}_{P_0}\n   $$\n   实际上${}^AT_B$的功能是将B下的坐标转到A下的坐标，所以叫做`T_A_from_B`\n\n2. **求逆快速算法**\n\n   由于${}^AT_B$可以被表示为\n   $$\n   {}^AT_{B}=\\begin{bmatrix}\n   R \u0026 t\\\\\n   0 \u0026 1\n   \\end{bmatrix}\n   $$\n   他的逆可以简化计算为\n   $$\n   {}^AT_{B}^{-1}=\\begin{bmatrix}\n   R^T \u0026 -R^T\\cdot t\\\\\n   0 \u0026 1\n   \\end{bmatrix}\n   $$\n\n\u003e 可以这样计算的原理：\n\u003e\n\u003e 根据前文，我们已知${}^AT_{B}$的逆 ${}^AT_{B}^{-1}={}^BT_{A}$也是一个旋转矩阵，从而也可以被表示为\n\u003e $$\n\u003e {}^AT_{B}^{-1}={}^BT_{A}=\\begin{bmatrix}\n\u003e R’ \u0026 t'\\\\\n\u003e 0 \u0026 1\n\u003e \\end{bmatrix}\n\u003e $$\n\u003e 那么就有了\n\u003e $$\n\u003e \\begin{bmatrix}\n\u003e R \u0026 t\\\\\n\u003e 0 \u0026 1\n\u003e \\end{bmatrix}\\cdot\\begin{bmatrix}\n\u003e R' \u0026 t'\\\\\n\u003e 0 \u0026 1\n\u003e \\end{bmatrix}=I\n\u003e $$\n\u003e 使用分块矩阵乘法\n\u003e $$\n\u003e \\begin{bmatrix}\n\u003e RR' \u0026 Rt'+t\\\\\n\u003e 0 \u0026 1\n\u003e \\end{bmatrix}=\\begin{bmatrix}\n\u003e I \u0026 0\\\\\n\u003e 0 \u0026 1\n\u003e \\end{bmatrix}\n\u003e $$\n\u003e 两边对应位置相等。并且考虑到$R$是旋转矩阵（正交），所以$R^{-1}$=$R^T$\n\u003e $$\n\u003e RR'=I \\Rightarrow R'=R^T=R^{-1}\\\\\n\u003e t'=-R^{-1}\\cdot t=-R^{T}\\cdot t\n\u003e $$\n"])</script><script>self.__next_f.push([1,"7:[\"$\",\"$12\",null,{\"fallback\":null,\"children\":[\"$\",\"$L15\",null,{\"meta\":{\"title\":\"Review of Some Fundamental Mathematics Commonly Used in Robotics (I): Coordinate Transformations\",\"title_cn\":\"回顾一些机器人常用的基础数学知识(一)：坐标变换\",\"subtitle\":\"\",\"subtitle_cn\":\"\",\"date\":\"2026-02-07\",\"tags\":[\"Math\"]},\"contentEn\":\"$16\",\"contentCn\":\"$17\"}]}]\n"])</script><script>self.__next_f.push([1,"c:null\n"])</script><script>self.__next_f.push([1,"10:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\nb:null\n"])</script><script>self.__next_f.push([1,"14:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Junshan Huang\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"PhD student at Rutgers University.\"}],[\"$\",\"meta\",\"2\",{\"name\":\"author\",\"content\":\"Junshan Huang\"}],[\"$\",\"meta\",\"3\",{\"name\":\"keywords\",\"content\":\"Junshan Huang,PhD,Research,Rutgers University\"}],[\"$\",\"meta\",\"4\",{\"name\":\"creator\",\"content\":\"Junshan Huang\"}],[\"$\",\"meta\",\"5\",{\"name\":\"publisher\",\"content\":\"Junshan Huang\"}],[\"$\",\"meta\",\"6\",{\"property\":\"og:title\",\"content\":\"Junshan Huang\"}],[\"$\",\"meta\",\"7\",{\"property\":\"og:description\",\"content\":\"PhD student at Rutgers University.\"}],[\"$\",\"meta\",\"8\",{\"property\":\"og:site_name\",\"content\":\"Junshan Huang's Academic Website\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:locale\",\"content\":\"en_US\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"website\"}],[\"$\",\"meta\",\"11\",{\"name\":\"twitter:card\",\"content\":\"summary\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:title\",\"content\":\"Junshan Huang\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:description\",\"content\":\"PhD student at Rutgers University.\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/fav.ico\"}]],\"error\":null,\"digest\":\"$undefined\"}\ne:{\"metadata\":\"$14:metadata\"
